<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVOICE TOKO BETE</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 25px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: heroFadeZoom 0.8s ease;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .menu button {
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      transition: all 0.35s ease;
    }

    .menu button:hover {
      transform: scale(1.05) translateX(5px);
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    .menu button.active {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      box-shadow: 0 8px 20px rgba(99,102,241,0.4);
      transform: scale(1.05);
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 12px;
      background: white;
      animation: fadeSlide 0.5s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heroFadeZoom {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="hero-title">SELAMAT DATANG DI INVOICE TOKO BETE</div>

    <div class="menu">
      <button onclick="loadPage('tagihan.html', this)">🧾 Invoice Tagihan</button>
      <button onclick="loadPage('penjualan.html', this)">🛒 Invoice Penjualan</button>
      <button onclick="loadPage('jasa.html', this)">🛠️ Invoice Jasa</button>
    </div>

    <iframe id="frame"></iframe>

  </div>

  <script>
    function loadPage(page, el) {
      document.getElementById('frame').src = page;

      document.querySelectorAll('.menu button').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }
  </script>

</body>
</html>
